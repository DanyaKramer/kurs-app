<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .login-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        input, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #message { text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Вход в систему</h2>
    <input type="text" id="username" placeholder="Логин (admin)" required>
    <input type="password" id="password" placeholder="Пароль (admin123)" required>
    <button onclick="login()">Войти</button>
    <div id="message"></div>
</div>

<script>
    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const msgDiv = document.getElementById('message');

        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });

        const result = await response.json();
        msgDiv.textContent = result.message;
        msgDiv.style.color = result.success ? 'green' : 'red';
    }
</script>

</body>
</html>
